name: Build ZenvX OS ISO

# Builds the live ISO inside a privileged Debian bookworm container using
# live-build, then publishes the ISO as a workflow artifact and (on tags) a
# GitHub Release. Running inside Debian avoids the Ubuntu runner's stale
# live-build defaults (which tried to bootstrap Ubuntu 'precise').

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "zenvx-iso/**"
      - "zenvx-os/**"
      - ".github/workflows/build-iso.yml"
  pull_request:
    paths:
      - "zenvx-iso/**"
      - "zenvx-os/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    name: Build ISO (live-build, Debian container)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: debian:bookworm
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux syslinux-common syslinux-utils \
            grub-pc-bin grub-efi-amd64-bin mtools \
            dosfstools ca-certificates curl git debian-archive-keyring procps
          lb --version || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make build scripts executable
        working-directory: zenvx-iso
        run: |
          chmod +x auto/config auto/build auto/clean || true
          find config/hooks -type f -name "*.hook.*" -print0 | xargs -0r chmod +x || true
          find config/includes.chroot/usr/local/bin -type f -print0 | xargs -0r chmod +x || true
          find config/includes.chroot/usr/share/plymouth -type f -name "*.script" -print0 | xargs -0r chmod +x || true

      - name: Build the ISO
        working-directory: zenvx-iso
        shell: bash
        run: |
          set -ux
          lb config
          set +e
          lb build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          set -e
          echo "lb build exit status: $status"
          if [ "$status" -ne 0 ]; then
            echo "===================== live-build errors (E:/W:) ====================="
            grep -nE '^(E|W):' build.log | tail -n 80 || true
            echo "===================== last 200 lines of build.log =================="
            tail -n 200 build.log
            exit "$status"
          fi

      - name: Locate and rename the ISO
        working-directory: zenvx-iso
        shell: bash
        run: |
          set -eu
          ISO=$(ls -1 *.iso live-image-*.iso 2>/dev/null | head -n1 || true)
          if [ -z "$ISO" ]; then
            echo "No ISO produced! Scanning build.log for errors:"
            grep -nE '^(E|W):' build.log | tail -n 80 || true
            echo "--- last 120 lines ---"
            tail -n 120 build.log || true
            ls -la
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME:-dev}"
          OUT="zenvx-os-${VERSION}-amd64.iso"
          mv "$ISO" "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"
          echo "Built: $OUT"

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenvx-os-iso
          path: |
            zenvx-iso/*.iso
            zenvx-iso/*.iso.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: zenvx-iso/build.log
          if-no-files-found: ignore

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zenvx-iso/*.iso
            zenvx-iso/*.iso.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Automated ZenvX OS live ISO build.

            - Hybrid BIOS + UEFI bootable image
            - SHA256 checksum attached

            Flash with:
            `sudo dd if=zenvx-os-*.iso of=/dev/sdX bs=4M status=progress oflag=sync`
